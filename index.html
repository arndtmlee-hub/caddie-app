<body>

<header>

    <button id="helpBtn" style="background:none; border:1.5px solid rgba(247,244,234,0.5); color:var(--cream); border-radius:8px; padding:5px 10px; font-size:11.5px; font-weight:700;">How it works</button>
  </div>

      <button class="hole-btn" id="holeDown">−</button>
      <div class="hole-num" id="holeNum">Hole 1</div>
      <button class="hole-btn" id="holeUp">+</button>
      <div id="parBadge" style="font-size:12px; opacity:0.85; font-weight:600;"></div>
    </div>

<main>
  <div id="checklistArea"></div>
  <div class="thought-card" id="thoughtCard">
    <div class="thought-label">Swing thought — pick one</div>
    <div class="thought-options" id="thoughtOptions"></div>
  </div>
  <div class="reset-row" id="resetRow">
    <button class="reset-link" id="resetShot">Clear swing thought</button>
  </div>
</main>

<div class="mental" id="mentalReset">
  <div class="mental-title" style="margin-top:10px;">Between-shot reset</div>
  <div class="mental-card">
    <div class="mental-item">10-second rule: feel it for 10 seconds, then let it go</div>
    <div class="mental-item">Walk to the next shot thinking about the next decision, not the last one</div>
    <div class="mental-item">Bogey golf is fine — avoid the double by playing safe, not heroic</div>
  </div>

<footer>

  <button class="nav-btn next" id="nextPhase">Next →</button>

<script>
const DATA = {
  tee: {
    label: "Tee",
    sections: [
      { title: "Before you step in", items: [
        "Pick the widest part of the fairway, not just \u201Cstraight ahead\u201D — aim away from trouble",
        "Identify where you DON\u2019T want to go (OB, water, rough) and aim opposite",
        "Club down if the hole is tight — 3-wood in the fairway beats driver in the trees"
      ]},
      { title: "Pre-shot routine", items: [
        "One practice swing, feel the tempo, not the mechanics",
        "Pick a small intermediate target 2-3 feet in front of the ball",
        "Grip pressure check — soft hands (4 out of 10)"
      ]}
    ],
    thoughts: ["Left hand controls the club face", "Smooth tempo", "3/4 swing"]
  },
  approach: {
    label: "Approach",
    sections: [
      { title: "Before you step in", items: [
        "Take one more club than you think, swing easy — most amateurs come up short",
        "Aim for center of green, not the pin, unless pin is dead center",
        "Is short-side trouble worse than long-side trouble? Miss to the safe side",
        "Factor in lie, wind, uphill/downhill, above/below before picking club and line"
      ]},
      { title: "Pre-shot routine", items: [
        "Am I comfortable in my setup — not too close/far from the ball",
        "Pick your landing spot, not just the target",
        "Commit to the club — no last-second changes"
      ]}
    ],
    thoughts: ["Hands low, head high", "Ball first, turf second", "Finish the swing"]
  },
  chip: {
    label: "Chip/Pitch",
    sections: [
      { title: "Before you step in", items: [
        "Assess how much green you have to work with — favor low, rolling shots over high flops",
        "Pick a landing spot 1-2 feet onto the green, trust the roll-out",
        "When in doubt, putt or bump-and-run instead of a delicate lofted shot"
      ]},
      { title: "Pre-shot routine", items: [
        "A couple practice swings feeling the landing spot",
        "Weight slightly forward, ball back in stance for a crisp, descending strike"
      ]}
    ],
    thoughts: ["Solid strike where ball meets the turf, body controls the swing", "Land it, let it run"]
  },
  putt: {
    label: "Putt",
    sections: [
      { title: "Before you step in", items: [
        "Read the putt from the low point of the green — establish a right/left break bias",
        "Trust your first read — don\u2019t second-guess",
        "Lag putts: focus on speed/distance over precise line"
      ]},
      { title: "Pre-shot routine", items: [
        "Use the line and putter with dominant eye to line up to target",
        "One practice stroke feeling the distance, visualize the putt going in",
        "Pick a spot 6-12 inches in front of the ball on your line, roll it over that spot"
      ]}
    ],
    thoughts: ["Shoulders/torso control the speed", "Smooth stroke, accelerate through"]
  }
};

const PHASES = ["tee","approach","chip","putt"];
const NAV_PHASES = ["tee","approach","chip","putt"]; // card excluded from next/prev flow
const UI_TABS = ["tee","approach","chip","putt","card"];
let currentHole = 1;
let currentPhase = "tee";

function emptyState(){
  const state = {};
  PHASES.forEach(p=>{
    state[p] = {};
  });
  state.data = { fairway:null, gir:null, putts:null, chipResult:null, score:null };
  return state;
}

let holes = {1: emptyState()};

function freshRoundThoughts(){
  return { tee:null, approach:null, chip:null, putt:null };
}
let roundThoughts = freshRoundThoughts();
let thoughtEditing = { tee:false, approach:false, chip:false, putt:false };

let roundMeta = null;
let setupStep = 1;
let setupCourseName = '';
let setupPars = {};
for(let i=1;i<=18;i++){ setupPars[i] = 4; }

function getHoleState(){
  if(!holes[currentHole]) holes[currentHole] = emptyState();
  return holes[currentHole];
}

const TAB_LABELS = { tee:"Tee", approach:"Approach", chip:"Chip/Pitch", putt:"Putt", card:"📋 Card" };

function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  UI_TABS.forEach(p=>{
    const btn = document.createElement('button');
    const isCard = p === 'card';
    btn.className = 'tab' + (p===currentPhase ? ' active' : '') + (isCard ? ' card-tab' : '');
    btn.textContent = TAB_LABELS[p];
    btn.onclick = ()=>{ currentPhase = p; render(); };
    tabs.appendChild(btn);
  });
}

function renderChecklist(){
  const area = document.getElementById('checklistArea');
  const thoughtCard = document.getElementById('thoughtCard');
  const resetRow = document.getElementById('resetRow');
  area.innerHTML = '';

  if(currentPhase === 'card'){
    thoughtCard.style.display = 'none';
    resetRow.style.display = 'none';
    renderSummary(area);
    return;
  }

  thoughtCard.style.display = '';
  resetRow.style.display = '';

  const phase = DATA[currentPhase];

  phase.sections.forEach((section)=>{
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = section.title;
    area.appendChild(label);

    section.items.forEach((text)=>{
      const row = document.createElement('div');
      row.className = 'item';
      row.innerHTML = '<div class="bullet"></div><div class="item-text">'+text+'</div>';
      area.appendChild(row);
    });
  });

  renderDataField(area);
  renderThoughtCard(phase);
}

function renderThoughtCard(phase){
  const thoughtLabel = document.querySelector('#thoughtCard .thought-label');
  const opts = document.getElementById('thoughtOptions');
  opts.innerHTML = '';

  const selected = roundThoughts[currentPhase];
  const editing = thoughtEditing[currentPhase];

  if(selected && !editing){
    thoughtLabel.textContent = 'Swing thought for this round';
    const wrap = document.createElement('div');
    wrap.className = 'thought-locked';
    wrap.innerHTML = '<div class="thought-locked-text">'+selected+'</div><button class="thought-change-btn" id="changeThoughtBtn">Change</button>';
    opts.appendChild(wrap);

function currentRoundCounts(){
  const holeNums = Object.keys(holes).map(Number).filter(n=>{
    const d = holes[n].data;
    return d.fairway!==null || d.gir!==null || d.putts!==null || d.chipResult!==null || d.score!==null;
  });
  let c = { fairwayElig:0, fairwayHit:0, girElig:0, girHit:0, puttsTotal:0, puttsHoles:0, chipElig:0, chipClose:0, scoreTotal:0, parTotal:0, scoredHoles:0, holesLogged:holeNums.length };
  holeNums.forEach(n=>{
    const d = holes[n].data;
    if(d.fairway !== null){ c.fairwayElig++; if(d.fairway) c.fairwayHit++; }
    if(d.gir !== null){ c.girElig++; if(d.gir) c.girHit++; }
    if(d.putts !== null){ c.puttsTotal += d.putts; c.puttsHoles++; }
    if(d.chipResult !== null){ c.chipElig++; if(d.chipResult==='mid' || d.chipResult==='close') c.chipClose++; }
    if(roundMeta && roundMeta.pars){
      const par = roundMeta.pars[n];
      const score = d.score !== null ? d.score : par;
      c.scoreTotal += score; c.parTotal += par; c.scoredHoles++;
    }
  });
  return c;
}

function pctFromCounts(c){
  return {
    fairwayPct: c.fairwayElig ? Math.round(c.fairwayHit/c.fairwayElig*100) : null,
    girPct: c.girElig ? Math.round(c.girHit/c.girElig*100) : null,
    chipPct: c.chipElig ? Math.round(c.chipClose/c.chipElig*100) : null,
    avgPutts: c.puttsHoles ? (c.puttsTotal/c.puttsHoles).toFixed(1) : null,
    toPar: c.scoredHoles ? (c.scoreTotal - c.parTotal) : null
  };
}

function sumCounts(list){
  const total = { fairwayElig:0, fairwayHit:0, girElig:0, girHit:0, puttsTotal:0, puttsHoles:0, chipElig:0, chipClose:0, scoreTotal:0, parTotal:0, scoredHoles:0, holesLogged:0 };
  list.forEach(c=>{
    total.fairwayElig += c.fairwayElig; total.fairwayHit += c.fairwayHit;
    total.girElig += c.girElig; total.girHit += c.girHit;
    total.puttsTotal += c.puttsTotal; total.puttsHoles += c.puttsHoles;
    total.chipElig += c.chipElig; total.chipClose += c.chipClose;
    total.scoreTotal += (c.scoreTotal||0); total.parTotal += (c.parTotal||0); total.scoredHoles += (c.scoredHoles||0);
    total.holesLogged += c.holesLogged;
  });
  return total;
}

const COURSES_KEY = 'caddie_courses_v1';
function loadCourses(){ try{ return JSON.parse(localStorage.getItem(COURSES_KEY) || '[]'); }catch(e){ return []; } }
function saveCourses(arr){ try{ localStorage.setItem(COURSES_KEY, JSON.stringify(arr)); }catch(e){} }
function saveCourseMemory(name, pars){
  if(!name || !pars) return;
  const courses = loadCourses();
  const existing = courses.find(c=> c.name.toLowerCase() === name.toLowerCase());
  if(existing){
    existing.pars = Object.assign({}, pars);
    existing.lastPlayed = new Date().toISOString();
    existing.playCount = (existing.playCount || 1) + 1;
  } else {
    courses.push({ name: name, pars: Object.assign({}, pars), lastPlayed: new Date().toISOString(), playCount: 1 });
  }
  // Score each course: playCount heavily weighted + recency bonus
  const now = Date.now();
  courses.forEach(c=>{
    const daysSince = (now - new Date(c.lastPlayed).getTime()) / (1000*60*60*24);
    const recencyScore = Math.max(0, 365 - daysSince) / 365; // 0-1 decaying over a year
    c._score = (c.playCount || 1) * 10 + recencyScore * 5;
  });
  // Sort by score descending, keep top 30
  courses.sort((a,b)=> b._score - a._score);
  saveCourses(courses.slice(0, 30).map(c=>{ delete c._score; return c; }));
}
function matchCourses(query){
  const courses = loadCourses();
  // already sorted by frequency+recency from save
  if(!query || query.trim().length === 0) return courses.slice(0, 5);
  const q = query.toLowerCase().trim();
  return courses.filter(c=> c.name.toLowerCase().includes(q)).slice(0, 5);
}

function buildScorecardText(){
  if(!roundMeta || !roundMeta.pars) return null;
  const lines = [];
  lines.push('SCORECARD');

  [1, 10].forEach(start=>{
    const label = start === 1 ? 'OUT' : 'IN';
    const holeNums = [];
    for(let i=start; i<=start+8; i++) holeNums.push(i);

    let holeStr  = 'Hole  | ';
    let parStr   = 'Par   | ';
    let scoreStr = 'Score | ';
    let parTotal = 0, scoreTotal = 0, anyScore = false;

    holeNums.forEach(n=>{
      const par = roundMeta.pars[n];
      const d = holes[n] ? holes[n].data : {};
      const score = (d.score !== null && d.score !== undefined) ? d.score : null;
      parTotal += par;
      holeStr  += String(n).padStart(3);
      parStr   += String(par).padStart(3);
      if(score !== null){
        const diff = score - par;
        let notation = String(score);
        if(diff <= -2) notation = '(('+score+'))';
        else if(diff === -1) notation = '('+score+')';
        else if(diff === 0)  notation = ' '+score+' ';
        else if(diff === 1)  notation = '['+score+']';
        else if(diff === 2)  notation = '[['+score+']]';
        else                 notation = '[[['+score+']]]';
        scoreTotal += score;
        anyScore = true;
        scoreStr += notation.padStart(3);
      } else {
        scoreStr += '  —';
      }
    });

    holeStr  += '  | ' + label;
    parStr   += '  | ' + parTotal;
    scoreStr += '  | ' + (anyScore ? scoreTotal : '—');
    lines.push(holeStr);
    lines.push(parStr);
    lines.push(scoreStr);
    lines.push('');
  });

  let totalPar = 0, totalScore = 0, anyScore = false;
  for(let i=1;i<=18;i++){
    totalPar += roundMeta.pars[i];
    const d = holes[i] ? holes[i].data : {};
    if(d.score !== null && d.score !== undefined){ totalScore += d.score; anyScore = true; }
  }
  lines.push('Total Par: ' + totalPar + '   Total Score: ' + (anyScore ? totalScore : '—'));
  lines.push('Key: (birdie) [bogey] [[double]] [[[triple+]]] ((eagle))');
  return lines.join('\n');
}

function buildRoundEmail(roundCounts, allCounts, history, courseName){
  const rp = pctFromCounts(roundCounts);
  const ap = pctFromCounts(allCounts);
  const dateStr = new Date().toLocaleDateString();
  const subject = 'Round summary \u2014 ' + (courseName ? courseName + ' \u2014 ' : '') + dateStr;
  const lines = [];
  lines.push('ROUND SUMMARY \u2014 ' + dateStr);
  if(courseName) lines.push('Course: ' + courseName);
  lines.push('Holes logged: ' + roundCounts.holesLogged);
  lines.push('Fairways hit: ' + (rp.fairwayPct===null?'—':rp.fairwayPct+'%'));
  lines.push('Greens in regulation: ' + (rp.girPct===null?'—':rp.girPct+'%'));
  lines.push('Chips inside 10\u2019: ' + (rp.chipPct===null?'—':rp.chipPct+'%'));
  lines.push('Avg putts/hole: ' + (rp.avgPutts===null?'—':rp.avgPutts));
  lines.push('Score to par: ' + (rp.toPar===null?'NA':(rp.toPar>0?'+':'')+rp.toPar));
  lines.push('');
  const scorecardText = buildScorecardText();
  if(scorecardText){ lines.push(scorecardText); lines.push(''); }
  lines.push('SEASON STATS (' + history.length + ' rounds saved)');
  lines.push('Fairways hit: ' + (ap.fairwayPct===null?'—':ap.fairwayPct+'%'));
  lines.push('Greens in regulation: ' + (ap.girPct===null?'—':ap.girPct+'%'));
  lines.push('Chips inside 10\u2019: ' + (ap.chipPct===null?'—':ap.chipPct+'%'));
  lines.push('Avg putts/hole: ' + (ap.avgPutts===null?'—':ap.avgPutts));
  lines.push('Score to par: ' + (ap.toPar===null?'NA':(ap.toPar>0?'+':'')+ap.toPar));
  lines.push('');
  const insightHtml = buildInsight(ap.fairwayPct, ap.girPct, ap.avgPutts, ap.chipPct, allCounts.holesLogged);
  const insightText = insightHtml.replace(/<\/div>/g, '\n').replace(/<[^>]+>/g, '').trim();
  lines.push('Biggest opportunity:\n' + insightText);
  return { subject: subject, body: lines.join('\n') };
}

function scoreNotation(score, par){
  if(score === null) return '<span style="color:var(--muted);">—</span>';
  const diff = score - par;
  const s = score;
  if(diff <= -2) return '<span class="sc-eagle">'+s+'</span>';
  if(diff === -1) return '<span class="sc-birdie">'+s+'</span>';
  if(diff === 0)  return '<span class="sc-par">'+s+'</span>';
  if(diff === 1)  return '<span class="sc-bogey">'+s+'</span>';
  if(diff === 2)  return '<span class="sc-double">'+s+'</span>';
  return '<span class="sc-triple">'+s+'</span>';
}

function finishAndEmail(){
  const liveCounts = currentRoundCounts();
  if(liveCounts.holesLogged === 0){ alert('No hole data logged yet.'); return; }
  if(!confirm('Save this round to history and send the summary email?')) return;
  const history = loadHistory();
  const courseName = roundMeta ? roundMeta.courseName : '';
  if(courseName && roundMeta && roundMeta.pars) saveCourseMemory(courseName, roundMeta.pars);
  history.push(Object.assign({ date: new Date().toISOString(), courseName: courseName }, liveCounts));
  saveHistory(history);
  const allCountsForEmail = sumCounts(history);
  const email = buildRoundEmail(liveCounts, allCountsForEmail, history, courseName);
  holes = {1: emptyState()};
  currentHole = 1;
  currentPhase = 'card';
  roundMeta = null;
  roundThoughts = freshRoundThoughts();
  thoughtEditing = { tee:false, approach:false, chip:false, putt:false };
  setupStep = 1;
  setupCourseName = '';
  setupPars = {};
  for(let i=1;i<=18;i++){ setupPars[i] = 4; }
  render();
  const to = loadEmail();
  const mailto = 'mailto:' + encodeURIComponent(to) + '?subject=' + encodeURIComponent(email.subject) + '&body=' + encodeURIComponent(email.body);
  window.location.href = mailto;
}

    history.slice().reverse().slice(0,10).forEach((r, revIdx)=>{
      const p = pctFromCounts(r);
      const d = new Date(r.date);
      const dateStr = (d.getMonth()+1)+'/'+d.getDate()+'/'+String(d.getFullYear()).slice(2);
      const courseLabel = r.courseName ? (r.courseName+' \u00B7 ') : '';
      // actual index in original (non-reversed) array
      const actualIdx = history.length - 1 - revIdx;
      const row = document.createElement('div');
      row.className = 'field-row';
      row.style.alignItems = 'flex-start';
      row.innerHTML =
        '<div>' +
          '<div class="field-label" style="margin-bottom:2px;">'+courseLabel+dateStr+' \u00B7 '+r.holesLogged+' holes</div>' +
          '<div style="font-size:12px; color:var(--muted);">FW '+(p.fairwayPct===null?'—':p.fairwayPct+'%')+' \u00B7 GIR '+(p.girPct===null?'—':p.girPct+'%')+' \u00B7 Putts '+(p.avgPutts===null?'—':p.avgPutts)+' \u00B7 Par '+(p.toPar===null?'NA':(p.toPar>0?'+':'')+p.toPar)+'</div>' +
        '</div>' +
        '<button class="del-round-btn" data-idx="'+actualIdx+'" style="flex-shrink:0; background:none; border:none; color:var(--muted); font-size:18px; padding:0 2px; line-height:1;">\u00D7</button>';
      area.appendChild(row);
    });

    // wire delete buttons after all rows rendered
    area.querySelectorAll('.del-round-btn').forEach(btn=>{
      btn.onclick = ()=>{
        const idx = parseInt(btn.dataset.idx, 10);
        if(!confirm('Remove this round from history?')) return;
        const h = loadHistory();
        h.splice(idx, 1);
        saveHistory(h);
        render();
      };
    });

    const clearRow = document.createElement('div');
    clearRow.className = 'reset-row';
    clearRow.innerHTML = '<button class="reset-link" id="clearHistoryBtn">Clear saved history</button>';
    area.appendChild(clearRow);
    document.getElementById('clearHistoryBtn').onclick = ()=>{
      if(!confirm('Delete all saved round history? This can\u2019t be undone.')) return;
      saveHistory([]);
      render();
    };
  }
}

function statCard(num, label){
  return '<div class="stat-card"><div class="stat-num">'+num+'</div><div class="stat-label">'+label+'</div></div>';
}

function buildInsight(fairwayPct, girPct, avgPutts, chipPct, holesLogged){
  if(holesLogged < 3){
    return '<div class="insight-line">Log a few more holes to start surfacing patterns.</div>';
  }
  const gaps = [];
  if(fairwayPct !== null) gaps.push({ area:'Driving accuracy', gap: 55 - fairwayPct, text: 'Fairways hit is '+fairwayPct+'%, well below a solid 55%+. Favor more conservative tee targets.' });
  if(girPct !== null) gaps.push({ area:'Approach play', gap: 30 - girPct, text: 'Greens in regulation is '+girPct+'%. Take one more club and aim center-green to lift this.' });
  if(chipPct !== null) gaps.push({ area:'Short game', gap: 60 - chipPct, text: 'Only '+chipPct+'% of chips finish inside 10\u2019. Favor the lower, rolling shot over the lofted one.' });
  if(avgPutts !== null) gaps.push({ area:'Putting', gap: (parseFloat(avgPutts) - 2.0) * 25, text: 'Averaging '+avgPutts+' putts per hole. Dial in speed control on lag putts to cut this down.' });

  gaps.sort((a,b)=> b.gap - a.gap);
  const top = gaps.filter(g=>g.gap > 0).slice(0,2);
  if(top.length === 0){
    return '<div class="insight-line">Solid all-around round so far — keep doing what you\u2019re doing.</div>';
  }
  return top.map(g=>'<div class="insight-line"><strong>'+g.area+':</strong> '+g.text+'</div>').join('');
}

    const courseLabel = r.courseName ? (r.courseName+' \u00B7 ') : '';
    const actualIdx = history.length - 1 - revIdx;

function renderSetupScreen(){
  const wrap = document.getElementById('setupScreen');
  document.getElementById('mainApp').style.display = 'none';
  wrap.style.display = '';
  wrap.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'setup-wrap';

  if(setupStep === 1){
    card.innerHTML =
      '<div class="setup-title">Round setup \u2014 step 1 of 2</div>' +
      '<div class="setup-sub">What course are you playing?</div>' +
      '<input type="text" id="courseNameInput" class="setup-input" placeholder="Course name" value="'+setupCourseName+'" autocomplete="off" />' +
      '<div id="courseDropdown"></div>' +
      '<div class="setup-btn-row" style="margin-top:8px;">' +
        '<button class="setup-btn-primary" id="setupNext">Next \u2192</button>' +
      '</div>' +
      '<div class="setup-btn-row" style="margin-top:8px;">' +
        '<button class="setup-btn-skip" id="setupSkipAll" style="flex:1;">Skip setup \u2014 generic round</button>' +
      '</div>' +
      '<div class="setup-btn-row" style="margin-top:8px;">' +
        '<button class="setup-btn-skip" id="viewCardBtn" style="flex:1;">📋 View Card & History</button>' +
      '</div>';
    wrap.appendChild(card);

    function renderDropdown(query){
      const dd = document.getElementById('courseDropdown');
      const matches = matchCourses(query);
      dd.innerHTML = '';
      if(matches.length === 0) return;
      const wrap2 = document.createElement('div');
      wrap2.className = 'course-dropdown';
      matches.forEach(c=>{
        const totalPar = Object.values(c.pars).reduce((a,b)=>a+b, 0);
        const opt = document.createElement('div');
        opt.className = 'course-option';
        const d = new Date(c.lastPlayed);
        const dateStr = (d.getMonth()+1)+'/'+d.getDate()+'/'+String(d.getFullYear()).slice(2);
        const plays = c.playCount || 1;
        opt.innerHTML = '<span>'+c.name+'</span><span class="course-option-par">Par '+totalPar+' \u00B7 '+plays+'x \u00B7 '+dateStr+'</span>';
        opt.onclick = ()=>{
          // auto-fill name and pars, skip to round start
          setupCourseName = c.name;
          setupPars = Object.assign({}, c.pars);
          roundMeta = { courseName: c.name, pars: Object.assign({}, c.pars) };
          render();
        };
        wrap2.appendChild(opt);
      });
      dd.appendChild(wrap2);
    }

    const inp = document.getElementById('courseNameInput');
    inp.oninput = (e)=>{
      setupCourseName = e.target.value;
      renderDropdown(e.target.value);
    };
    // show recent courses immediately on focus if input empty
    inp.onfocus = (e)=>{
      if(!e.target.value) renderDropdown(' ');
    };
    // show on load if name pre-filled
    if(setupCourseName) renderDropdown(setupCourseName);

    document.getElementById('setupNext').onclick = ()=>{
      document.getElementById('courseDropdown').innerHTML = '';
      setupStep = 2;
      render();
    };
    document.getElementById('setupSkipAll').onclick = ()=>{
      roundMeta = { courseName: '', pars: null };
      render();
    };
    document.getElementById('viewCardBtn').onclick = ()=>{ showHistoryOverlay(); };
  } else {
    let parsHtml = '';
    for(let i=1;i<=18;i++){
      parsHtml += '<div class="par-cell"><div class="par-cell-label">Hole '+i+'</div><div class="par-cell-stepper">' +
        '<button class="par-mini-btn" data-hole="'+i+'" data-dir="-1">\u2212</button>' +
        '<span class="par-mini-val" id="parVal'+i+'">'+setupPars[i]+'</span>' +
        '<button class="par-mini-btn" data-hole="'+i+'" data-dir="1">+</button>' +
      '</div></div>';
    }
    card.innerHTML =
      '<div class="setup-title">Round setup \u2014 step 2 of 2</div>' +
      '<div class="setup-sub">Set par for each hole, or skip to track without par (greens in regulation still works either way).</div>' +
      '<div class="par-grid">'+parsHtml+'</div>' +
      '<div class="setup-btn-row">' +
        '<button class="setup-btn-primary" id="setupSave">Save &amp; start round</button>' +
      '</div>' +
      '<div class="setup-btn-row" style="margin-top:8px;">' +
        '<button class="setup-btn-skip" id="setupSkipPars" style="flex:1;">Skip par targets</button>' +
      '</div>';
    wrap.appendChild(card);
    document.querySelectorAll('.par-mini-btn').forEach(btn=>{
      btn.onclick = ()=>{
        const h = parseInt(btn.dataset.hole, 10);
        const dir = parseInt(btn.dataset.dir, 10);
        setupPars[h] = Math.max(3, Math.min(5, setupPars[h] + dir));
        document.getElementById('parVal'+h).textContent = setupPars[h];
      };
    });
    document.getElementById('setupSave').onclick = ()=>{
      roundMeta = { courseName: setupCourseName, pars: Object.assign({}, setupPars) };
      saveCourseMemory(setupCourseName, setupPars);
      render();
    };
    document.getElementById('setupSkipPars').onclick = ()=>{
      roundMeta = { courseName: setupCourseName, pars: null };
      render();
    };
  }
}

function renderCourseTag(){
  const tag = document.getElementById('courseTag');
  if(!roundMeta){ tag.innerHTML = ''; return; }
  const name = roundMeta.courseName || 'Generic round';
  const parInfo = roundMeta.pars ? ' \u00B7 par tracked' : '';
  tag.innerHTML = '<span>'+name+parInfo+'</span><button id="editSetupBtn" style="background:none;border:none;color:var(--cream);text-decoration:underline;font-size:12px;opacity:0.85;">Edit</button>';
  document.getElementById('editSetupBtn').onclick = ()=>{
    setupCourseName = roundMeta.courseName || '';
    if(roundMeta.pars) setupPars = Object.assign({}, roundMeta.pars);
    setupStep = 1;
    roundMeta = null;
    render();
  };
}

let helpVisible = false;

function renderHelpScreen(){
  const wrap = document.getElementById('helpScreen');
  wrap.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'setup-wrap';
  card.innerHTML =
    '<div class="setup-title">How this app works</div>' +
    '<div class="setup-sub" style="margin-bottom:14px;">A quick caddie checklist and stat tracker built for getting around the course \u2014 not slowing you down.</div>' +
    '<div class="section-label">During the round</div>' +
    '<div class="mental-item">Optional setup before you start: course name and hole-by-hole par (or skip for a generic round).</div>' +
    '<div class="mental-item">Tabs for Tee, Approach, Chip/Pitch, and Putt \u2014 each with a short pre-shot checklist for that shot.</div>' +
    '<div class="mental-item">Pick one swing thought per shot type; it locks in for the whole round and shows big and bold until you tap Change.</div>' +
    '<div class="mental-item">Quick taps log fairway hit, green in regulation, chip proximity, putts, and score \u2014 right on the tab where that shot happens.</div>' +
    '<div class="mental-item">A between-shot mental reset reminder sits below every tab to help you move on after good or bad shots.</div>' +
    '<div class="section-label" style="margin-top:16px;">Across the season</div>' +
    '<div class="mental-item">The Card tab totals this round live, then lets you Finish round to save it to your history.</div>' +
    '<div class="mental-item">Finishing a round opens a pre-filled email with this round\u2019s stats and your all-time season stats \u2014 you just hit send.</div>' +
    '<div class="mental-item">All-time stats and a \u201Cbiggest opportunity\u201D insight build automatically the more rounds you save, pointing you to the area (driving, approach, short game, or putting) costing you the most strokes.</div>' +
    '<div class="mental-item">Your saved rounds list shows fairway %, GIR %, putts, and score to par (or NA when par wasn\u2019t tracked) for each round, right on your phone.</div>' +
    '<div class="setup-btn-row" style="margin-top:18px;">' +
      '<button class="setup-btn-primary" id="closeHelpBtn">Got it</button>' +
    '</div>';
  wrap.appendChild(card);
  document.getElementById('closeHelpBtn').onclick = ()=>{
    helpVisible = false;
    render();
  };
}

document.getElementById('helpBtn').onclick = ()=>{
  helpVisible = true;
  render();
};

function render(){
  const helpEl = document.getElementById('helpScreen');
  const setupEl = document.getElementById('setupScreen');
  const mainEl = document.getElementById('mainApp');

  if(helpVisible){
    helpEl.style.display = '';
    setupEl.style.display = 'none';
    mainEl.style.display = 'none';
    renderHelpScreen();
    return;
  }
  helpEl.style.display = 'none';

  if(roundMeta === null){
    renderSetupScreen();
    document.getElementById('holeNum').textContent = 'Hole ' + currentHole;
    renderCourseTag();
    return;
  }
  setupEl.style.display = 'none';
  mainEl.style.display = '';
  document.getElementById('holeNum').textContent = 'Hole ' + currentHole;

  // par badge
  const parBadge = document.getElementById('parBadge');
  if(roundMeta && roundMeta.pars){
    parBadge.textContent = 'Par ' + roundMeta.pars[currentHole];
  } else {
    parBadge.textContent = '';
  }

  // mental reset - hide on card tab
  const mentalEl = document.getElementById('mentalReset');
  if(mentalEl) mentalEl.style.display = currentPhase === 'card' ? 'none' : '';

  // next button label
  const nextBtn = document.getElementById('nextPhase');
  if(currentPhase === 'putt'){
    nextBtn.textContent = 'Next Hole →';
  } else if(currentPhase === 'card'){
    nextBtn.textContent = 'Next →';
    nextBtn.style.display = 'none';
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.style.display = '';
  }

  // prev button - hide on card
  const prevBtn = document.getElementById('prevPhase');
  prevBtn.style.display = currentPhase === 'card' ? 'none' : '';

  renderCourseTag();
  renderTabs();
  renderChecklist();
}

document.getElementById('holeUp').onclick = ()=>{
  currentHole = Math.min(18, currentHole+1);
  currentPhase = 'tee';
  render();
};
document.getElementById('holeDown').onclick = ()=>{
  currentHole = Math.max(1, currentHole-1);
  currentPhase = 'tee';
  render();
};
document.getElementById('newRound').onclick = ()=>{
  if(confirm('Start a new round? This clears all holes.')){
    holes = {1: emptyState()};
    currentHole = 1;
    currentPhase = 'tee';
    roundMeta = null;
    roundThoughts = freshRoundThoughts();
    thoughtEditing = { tee:false, approach:false, chip:false, putt:false };
    setupStep = 1;
    setupCourseName = '';
    setupPars = {};
    for(let i=1;i<=18;i++){ setupPars[i] = 4; }
    render();
  }
};
document.getElementById('resetShot').onclick = ()=>{
  if(currentPhase === 'card') return;
  roundThoughts[currentPhase] = null;
  thoughtEditing[currentPhase] = false;
  render();
};
document.getElementById('prevPhase').onclick = ()=>{
  if(currentPhase === 'card'){ currentPhase = 'putt'; render(); return; }
  const idx = NAV_PHASES.indexOf(currentPhase);
  if(idx > 0) currentPhase = NAV_PHASES[idx - 1];
  render();
};
document.getElementById('nextPhase').onclick = ()=>{
  if(currentPhase === 'card') return;
  const idx = NAV_PHASES.indexOf(currentPhase);
  if(currentPhase === 'putt'){
    // Auto-commit par as score if player never touched the stepper
    if(roundMeta && roundMeta.pars){
      const d = getHoleState().data;
      if(d.score === null){
        d.score = roundMeta.pars[currentHole];
      }
    }
    // Next Hole
    currentHole = Math.min(18, currentHole + 1);
    currentPhase = 'tee';
  } else {
    currentPhase = NAV_PHASES[idx + 1];
  }
  render();
};

render();
</script>
